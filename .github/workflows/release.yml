# This file was generated by cargo-dist (and hand-tuned for rookdb-cli).
# cargo-dist: https://opensource.axo.dev/cargo-dist/
#
# Trigger: push a tag like `v0.1.0` → full release pipeline runs.
#
# The workflow:
#   1. plan    – cargo dist plan computes what to build
#   2. build   – parallel matrix job for each target triple
#   3. host    – uploads artifacts to a staging area
#   4. publish – creates the GitHub Release, pushes Homebrew formula
#
# Secrets required (set in repo Settings → Secrets and variables → Actions):
#   HOMEBREW_TAP_TOKEN  – fine-grained PAT with `contents: write`
#                         on the RookDB/homebrew-tap repository

name: Release

permissions:
  contents: write   # create GitHub Releases and upload assets

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # e.g. v0.1.0, v1.2.3-rc1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # PLAN — figure out which artifacts need to be built
  # ─────────────────────────────────────────────────────────────────────────
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !startsWith(github.ref, 'refs/tags/') && 'preview' || '' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cargo-dist
        # Keep this version in sync with [workspace.metadata.dist] cargo-dist-version
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
            | sh

      - name: Plan
        id: plan
        run: |
          cargo dist plan --tag="${{ github.ref_name }}" --output-format=json > plan.json
          echo "manifest=$(cat plan.json)" >> "$GITHUB_OUTPUT"
          cargo dist plan --tag="${{ github.ref_name }}"

  # ─────────────────────────────────────────────────────────────────────────
  # BUILD — one job per target triple, run in parallel
  # ─────────────────────────────────────────────────────────────────────────
  build-local:
    name: Build ${{ matrix.target }}
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 ───────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            install_dist: |
              curl --proto '=https' --tlsv1.2 -LsSf \
                https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
                | sh

          # ── Linux aarch64 (cross-compiled) ─────────────────────────────
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            install_dist: |
              curl --proto '=https' --tlsv1.2 -LsSf \
                https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
                | sh

          # ── macOS x86_64 ───────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-13
            install_dist: |
              curl --proto '=https' --tlsv1.2 -LsSf \
                https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
                | sh

          # ── macOS Apple Silicon ─────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-14
            install_dist: |
              curl --proto '=https' --tlsv1.2 -LsSf \
                https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
                | sh

          # ── Windows x86_64 ─────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            install_dist: |
              $url = "https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.ps1"
              irm $url | iex

    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Enable long paths on Windows (avoids MAX_PATH issues)
      - name: Configure Windows long paths
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      # Install a stable Rust toolchain + the right cross-compilation target
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache compiled dependencies for faster subsequent builds
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install cross for aarch64 Linux (cross-compilation)
      - name: Install cross (aarch64-linux only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install cargo-dist
        run: ${{ matrix.install_dist }}

      - name: Build artifacts
        run: cargo dist build --target=${{ matrix.target }} --output-format=json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: |
            target/distrib/
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # PUBLISH — gather artifacts, create GitHub Release, push Homebrew formula
  # ─────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [plan, build-local]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Collect all per-target artifacts into one place
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh \
            | sh

      # Create the GitHub Release and upload all binaries + installer scripts
      - name: Publish to GitHub Releases
        run: |
          cargo dist publish \
            --tag="${{ github.ref_name }}" \
            --output-format=json

      # Push the updated Homebrew formula to RookDB/homebrew-tap
      - name: Push Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cargo dist publish-homebrew \
            --tag="${{ github.ref_name }}" \
            --tap=RookDB/homebrew-tap \
            --token="${HOMEBREW_TAP_TOKEN}"
